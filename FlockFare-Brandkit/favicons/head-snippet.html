<!-- Paste inside <head> of your FlockFare web app -->
<!-- FAVICONS & PWA -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link rel="shortcut icon" href="/favicon.ico"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<link rel="manifest" href="/site.webmanifest"/>

<!-- THEME COLORS -->
<meta name="theme-color" content="#D8FF3C" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0B0B0F" media="(prefers-color-scheme: dark)"/>
<meta name="color-scheme" content="light dark"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FlockFare"/>

<!-- OPEN GRAPH / TWITTER -->
<meta property="og:site_name" content="FlockFare"/>
<meta property="og:title" content="FlockFare — deals, drops, departures."/>
<meta property="og:description" content="Cheap flight and hotel alerts for the flock. Hand-picked mistake fares, flash sales, and price drops."/>
<meta property="og:type" content="website"/>
<meta property="og:image" content="/og-image.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>

<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="FlockFare — deals, drops, departures."/>
<meta name="twitter:description" content="Cheap flight and hotel alerts for the flock."/>
<meta name="twitter:image" content="/og-image.png"/>

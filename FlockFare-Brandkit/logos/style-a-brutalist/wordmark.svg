<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="FlockFare Neo-Brutalist wordmark">
  <text x="8" y="150"
        font-family="'Bricolage Grotesque','Archivo Black',system-ui,sans-serif"
        font-weight="900"
        font-size="160"
        letter-spacing="-8"
        fill="#0B0B0F">Flock<tspan fill="#6D28FF">Fare</tspan></text>
  <!-- Brutalist underline: lime block with black bar on top -->
  <rect x="8" y="176" width="712" height="18" fill="#D8FF3C"/>
  <rect x="8" y="176" width="712" height="4" fill="#0B0B0F"/>
  <!-- Coral tick -->
  <rect x="620" y="176" width="100" height="18" fill="#FF4E64"/>
  <rect x="620" y="176" width="100" height="4" fill="#0B0B0F"/>
</svg>

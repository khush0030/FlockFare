<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="FlockFare safe area guide">
  <rect x="0" y="0" width="800" height="600" fill="#FAFAF6"/>

  <!-- Clear space rectangle (dashed) -->
  <rect x="120" y="120" width="560" height="360" fill="none" stroke="#6D28FF" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- Inner mark (256 tile centred) -->
  <g transform="translate(272, 172)">
    <rect x="0" y="0" width="256" height="256" rx="28" fill="#D8FF3C" stroke="#0B0B0F" stroke-width="8"/>
    <path d="M40 172 L104 108 L168 172" stroke="#6D28FF" stroke-width="26"
          stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    <path d="M80 208 L168 118 L232 184" stroke="#0B0B0F" stroke-width="34"
          stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    <circle cx="204" cy="64" r="20" fill="#FF4E64" stroke="#0B0B0F" stroke-width="6"/>
    <circle cx="204" cy="64" r="6" fill="#0B0B0F"/>
  </g>

  <!-- Measurement indicators -->
  <g font-family="'JetBrains Mono',monospace" font-size="13" fill="#6D28FF" font-weight="700">
    <!-- Top spacer -->
    <line x1="400" y1="120" x2="400" y2="172" stroke="#FF4E64" stroke-width="2" marker-end="url(#arr)"/>
    <text x="412" y="152" fill="#FF4E64">= X (50% mark height)</text>
    <!-- Left spacer -->
    <line x1="120" y1="300" x2="272" y2="300" stroke="#FF4E64" stroke-width="2"/>
    <text x="138" y="294" fill="#FF4E64">X</text>
  </g>

  <!-- Labels -->
  <text x="120" y="52"
        font-family="'Bricolage Grotesque',system-ui,sans-serif"
        font-weight="900" font-size="40" fill="#0B0B0F">Clear space = X</text>
  <text x="120" y="92"
        font-family="'DM Sans',system-ui,sans-serif"
        font-size="16" fill="#333">Keep the dashed area free of text, imagery, and competing marks.</text>

  <text x="120" y="532"
        font-family="'JetBrains Mono',monospace" font-size="11" letter-spacing="2" fill="#0B0B0F">
    MINIMUM SIZE · DIGITAL 24PX · PRINT 12MM
  </text>
</svg>

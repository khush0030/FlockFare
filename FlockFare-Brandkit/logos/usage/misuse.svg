<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="FlockFare logo misuse examples">
  <rect x="0" y="0" width="1200" height="800" fill="#FAFAF6"/>
  <text x="60" y="70"
        font-family="'Bricolage Grotesque',system-ui,sans-serif"
        font-weight="900" font-size="44" fill="#0B0B0F">Please don't.</text>
  <text x="60" y="102"
        font-family="'DM Sans',system-ui,sans-serif"
        font-size="16" fill="#333">Six common ways the mark gets broken.</text>

  <!-- helpers -->
  <defs>
    <g id="ffMark">
      <rect x="0" y="0" width="200" height="200" rx="22" fill="#D8FF3C" stroke="#0B0B0F" stroke-width="6"/>
      <path d="M32 134 L82 84 L132 134" stroke="#6D28FF" stroke-width="20"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <path d="M62 162 L132 92 L182 142" stroke="#0B0B0F" stroke-width="26"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <circle cx="162" cy="50" r="16" fill="#FF4E64" stroke="#0B0B0F" stroke-width="4"/>
    </g>
    <symbol id="no" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#FF4E64" stroke-width="4"/>
      <line x1="8" y1="32" x2="32" y2="8" stroke="#FF4E64" stroke-width="4" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- Cell 1: stretched -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="320" height="220" fill="#FFFFFF" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(60, 20) scale(1.4, 0.65)">
      <use href="#ffMark"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T STRETCH OR SQUISH</text>
  </g>

  <!-- Cell 2: rotated -->
  <g transform="translate(440, 140)">
    <rect x="0" y="0" width="320" height="220" fill="#FFFFFF" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(160, 110) rotate(20) translate(-100, -100)">
      <use href="#ffMark"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T ROTATE</text>
  </g>

  <!-- Cell 3: recolour -->
  <g transform="translate(820, 140)">
    <rect x="0" y="0" width="320" height="220" fill="#FFFFFF" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(60, 10)">
      <rect x="0" y="0" width="200" height="200" rx="22" fill="#00E5A1" stroke="#0B0B0F" stroke-width="6"/>
      <path d="M32 134 L82 84 L132 134" stroke="#FF8A3D" stroke-width="20"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <path d="M62 162 L132 92 L182 142" stroke="#0B0B0F" stroke-width="26"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <circle cx="162" cy="50" r="16" fill="#2195F3" stroke="#0B0B0F" stroke-width="4"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T RECOLOUR</text>
  </g>

  <!-- Cell 4: low contrast -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="320" height="220" fill="#D8FF3C" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(60, 10)">
      <rect x="0" y="0" width="200" height="200" rx="22" fill="#D8FF3C" stroke="#0B0B0F" stroke-width="6"/>
      <path d="M62 162 L132 92 L182 142" stroke="#0B0B0F" stroke-width="26"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T PLACE ON LIME BG</text>
  </g>

  <!-- Cell 5: drop shadow -->
  <g transform="translate(440, 400)">
    <rect x="0" y="0" width="320" height="220" fill="#FFFFFF" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(60, 20)" filter="url(#fuzz)">
      <rect x="0" y="0" width="200" height="200" rx="22" fill="#0B0B0F" opacity="0.35"/>
    </g>
    <g transform="translate(60, 10)">
      <use href="#ffMark"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T ADD DROP SHADOW</text>
  </g>

  <!-- Cell 6: cropped -->
  <g transform="translate(820, 400)">
    <rect x="0" y="0" width="320" height="220" fill="#FFFFFF" stroke="#0B0B0F" stroke-width="2"/>
    <g transform="translate(-30, 30) scale(1.1)">
      <use href="#ffMark"/>
    </g>
    <use href="#no" x="280" y="10" width="30" height="30"/>
    <text x="14" y="204" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#0B0B0F">DON'T CROP THE MARK</text>
  </g>

  <filter id="fuzz" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8"/>
  </filter>

  <text x="60" y="740"
        font-family="'DM Sans',system-ui,sans-serif" font-size="14" fill="#666">
    When in doubt: use the horizontal lockup, on cream or white, with no effects.
  </text>
</svg>

name: FlockFare Fare Crawler

on:
  schedule:
    # Daily at 06:00 UTC (~11:30 AM IST).
    # Quota: 8 calls/day multi-city + 16 calls/day baseline routes (4 origins ×
    # 4 destinations) = 24/day ≈ 720/month. Free tier is 250/mo — paid plan
    # required. Trim baseline_routes.ORIGINS/DESTINATIONS to stay under quota.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch only, no storage)'
        required: false
        type: boolean
        default: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        working-directory: crawler
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="--dry-run"
          fi
          python run.py $ARGS
